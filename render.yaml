services:
  - type: web
    name: almacen-mirta-web
    env: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: almacen-mirta-db
          property: connectionString
      - key: ADMIN_USER
        value: almacenmirta
      - key: ADMIN_PASSWORD
        value: almacen!
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: almacen-mirta-db
    plan: free
